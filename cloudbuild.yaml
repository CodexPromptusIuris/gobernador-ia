steps:
  # Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bro-partner-backend:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bro-partner-backend:$SHORT_SHA'
      - './backend'

  # Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bro-partner-frontend:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bro-partner-frontend:$SHORT_SHA'
      - './frontend'

  # Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bro-partner-backend:latest']

  # Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bro-partner-frontend:latest']

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=k8s/
      - --image=gcr.io/$PROJECT_ID/bro-partner-backend:$SHORT_SHA
      - --location=us-central1
      - --namespace=default

images:
  - 'gcr.io/$PROJECT_ID/bro-partner-backend:latest'
  - 'gcr.io/$PROJECT_ID/bro-partner-frontend:latest'

timeout: '1800s'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
